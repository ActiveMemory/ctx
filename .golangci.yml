version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - goconst
    - gosec
    - unconvert
    - gocritic

  settings:
    govet:
      enable:
        - shadow

  exclusions:
    paths:
      - vendor
      - dist
      - site
    rules:
      # Test files use literal strings for clarity
      - linters: [goconst]
        path: "_test\\.go"
      # Test files construct paths from test constants, not user input
      - linters: [gosec]
        text: "G304"
        path: "_test\\.go"
      # Test files use 0644/0755 for throwaway temp files and dirs
      - linters: [gosec]
        text: "G30[16]"
        path: "_test\\.go"
      # TextDescKey constants are i18n keys, not credentials
      - linters: [gosec]
        text: "G101"
        path: "internal/config/embed/text/"
      # Env-var name constants in config/backend/ name where to
      # read credentials from; they are not credentials themselves
      - linters: [gosec]
        text: "G101"
        path: "internal/config/backend/"
      # Test files use sk-test-* literals as fixtures, not real keys
      - linters: [gosec]
        text: "G101"
        path: "_test\\.go"
      # CLI flag-name constants in config/flag/ and config/embed/flag/
      # are user-facing flag strings (e.g., "api-key-env"), not creds
      - linters: [gosec]
        text: "G101"
        path: "internal/config/flag/"
      - linters: [gosec]
        text: "G101"
        path: "internal/config/embed/flag/"

run:
  timeout: 5m

output:
  formats:
    text:
      colors: true
